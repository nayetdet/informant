resources:
  - cronjob.yml
  - pvc.yml

secretGenerator:
  - name: informant-secret
    envs:
      - .env.secret

configMapGenerator:
  - name: informant-config
    envs:
      - .env.config

replacements:
  - source:
      kind: ConfigMap
      name: informant-config
      fieldPath: data.TZ
    targets:
      - select:
          kind: CronJob
          name: informant
        fieldPaths:
          - spec.timeZone
  - source:
      kind: ConfigMap
      name: informant-config
      fieldPath: data.CRON
    targets:
      - select:
          kind: CronJob
          name: informant
        fieldPaths:
          - spec.schedule
