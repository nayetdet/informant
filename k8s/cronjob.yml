apiVersion: batch/v1
kind: CronJob
metadata:
  name: informant
spec:
  # Replaced by kustomize from `informant-config.data.CRON`.
  schedule: "0 * * * *"
  # Replaced by kustomize from `informant-config.data.TZ`.
  timeZone: America/Fortaleza
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: informant
              image: ghcr.io/nayetdet/informant:latest
              imagePullPolicy: Always
              env:
                - name: TZ
                  valueFrom:
                    configMapKeyRef:
                      name: informant-config
                      key: TZ
                - name: TELEGRAM_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: informant-secret
                      key: TELEGRAM_BOT_TOKEN
                - name: TELEGRAM_BOT_CHAT_ID
                  valueFrom:
                    secretKeyRef:
                      name: informant-secret
                      key: TELEGRAM_BOT_CHAT_ID
              volumeMounts:
                - name: informant-auth-data
                  mountPath: /root/.codex/auth.json
                  subPath: auth.json
                  readOnly: true
                - name: informant-codex-data
                  mountPath: /root/.codex
                - name: informant-data
                  mountPath: /app/data
          volumes:
            - name: informant-auth-data
              secret:
                secretName: informant-auth-secret
                items:
                  - key: auth.json
                    path: auth.json
            - name: informant-codex-data
              emptyDir: {}
            - name: informant-data
              persistentVolumeClaim:
                claimName: informant-pvc
